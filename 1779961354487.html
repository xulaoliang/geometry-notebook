
<!DOCTYPE html>
<html>

<script src="https://www.geogebra.org/apps/deployggb.js"></script>
</head>

<body style="margin:0; padding:0;">
<div id="ggb-element"></div>

<script>

var params = {
  appName: "geometry",
  width: 900,
  height: 600,
  showToolBar: false,
  showMenuBar: false,

  appletOnLoad: function(api) {

    applet.inject('ggb-element');
});

</script>

</body>
</html>
